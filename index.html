<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cek Data BNBA Rumah Rusak</title>
  <style>
    body {font-family: Arial, sans-serif; background: #f4f6f9; padding: 20px;}
    h2 {text-align: center; background: #3498db; color: #fff; padding: 12px; border-radius: 6px; font-size: 22px; font-weight: bold;}
    .form-container {max-width: 600px; margin: 20px auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1);}
    label {display: block; margin-top: 10px; font-weight: bold;}
    input {width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px;}
    button {margin-top: 15px; width: 100%; padding: 10px; background: #3498db; color: #fff; border: none; border-radius: 4px; font-size: 16px; cursor: pointer;}
    button:hover {background: #2980b9;}
    #hasil {margin-top: 20px;}
    table {width: 100%; border-collapse: collapse; margin-top: 10px;}
    th, td {border: 1px solid #ddd; padding: 8px; text-align: left;}
    th {background: #3498db; color: #fff;}
  </style>
</head>
  <body>
  <!-- Bagian logo + nama instansi -->
  <div style="text-align:center; margin-bottom:20px;">
    <!-- Logo berdampingan -->
    <img src="tapteng.png" alt="Logo 1" style="height:80px; margin-right:10px;">
    <img src="bpbdtapteng.png" alt="Logo 2" style="height:80px; margin-left:10px;">

    <!-- Nama instansi -->
    <h3>PEMERINTAH KABUPATEN TAPANULI TENGAH</h3>
    <h4>BADAN PENANGGULANGAN BENCANA DAERAH</h4>
  </div>
</body>

<body>
  <h2>Cek Data BNBA Rumah Rusak</h2>
  <div class="form-container">
    <label for="searchNIK">NIK:</label>
    <input type="text" id="searchNIK" placeholder="Masukkan NIK">

    <label for="searchNama">Nama:</label>
    <input type="text" id="searchNama" placeholder="Masukkan Nama">

    <label for="searchKK">Nomor KK:</label>
    <input type="text" id="searchKK" placeholder="Masukkan Nomor KK">

    <button onclick="cariData()">Cari</button>
    <div id="hasil"></div>
  </div>

  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script>
    let dataBNBA = [];

    // Fetch file CSV dengan timestamp agar tidak cache
    fetch("DATA_BNBA_123.csv?nocache=" + new Date().getTime())
      .then(res => res.text())
      .then(text => {
        Papa.parse(text, {
          header: true,
          skipEmptyLines: true,
          complete: function(results) {
            dataBNBA = results.data;
            console.log("Data BNBA siap:", dataBNBA);
          }
        });
      });

    function cariData() {
      const nikInput  = document.getElementById("searchNIK").value.trim();
      const namaInput = document.getElementById("searchNama").value.trim().toLowerCase();
      const kkInput   = document.getElementById("searchKK").value.trim();

      let matches = [];

      for (let row of dataBNBA) {
        const nik  = row["NIK"]?.trim();
        const nama = row["NAMA"]?.toLowerCase();
        const kk   = row["NO. KK"]?.trim();

        if (
          (nikInput && nik === nikInput) ||
          (namaInput && nama.includes(namaInput)) ||
          (kkInput && kk === kkInput)
        ) {
          matches.push(row);
        }
      }

      let hasil = "<p>Data tidak ditemukan</p>";
      if (matches.length > 0) {
        hasil = "<h3>Hasil Pencarian:</h3>";
        matches.forEach((row, idx) => {
          let tableRows = "";
          for (let key in row) {
            tableRows += `<tr><th>${key}</th><td>${row[key]}</td></tr>`;
          }
          hasil += `<h4>Data #${idx+1}</h4><table>${tableRows}</table><br>`;
        });
      }

      document.getElementById("hasil").innerHTML = hasil;
    }
  </script>
</body>
</html>
