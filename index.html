<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Cek Data BNBA</title>
</head>
<body>
  <h2>Cek Data BNBA</h2>
  <input type="text" id="searchNIK" placeholder="Masukkan NIK">
  <button onclick="cariData()">Cari</button>
  <div id="hasil"></div>

  <script>
    let rows = [];

    // Fetch file CSV dari repository
    fetch("DATA BNBA_123.csv")
      .then(res => res.text())
      .then(text => {
        rows = text.split("\n").map(r => r.split(","));
        console.log("Data BNBA siap dipakai:", rows);
      });

    function cariData() {
      const nikInput = document.getElementById("searchNIK").value.trim();
      let hasil = "Data tidak ditemukan";

      // Asumsi kolom pertama berisi NIK
      for (let i = 1; i < rows.length; i++) {
        if (rows[i][0] === nikInput) {
          hasil = "NIK: " + rows[i][0] + "<br>Nama: " + rows[i][1] + "<br>Alamat: " + rows[i][2];
          break;
        }
      }

      document.getElementById("hasil").innerHTML = hasil;
    }
  </script>
</body>
</html>
