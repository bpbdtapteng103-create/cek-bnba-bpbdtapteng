<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Cek Data BNBA</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 20px;
    }
    h2 {
      text-align: center;
      color: #2c3e50;
    }
    .form-container {
      max-width: 600px;
      margin: 20px auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      background: #3498db;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #2980b9;
    }
    #hasil {
      margin-top: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
    th {
      background: #3498db;
      color: #fff;
    }
  </style>
</head>
<body>
  <h2>Cek Data BNBA</h2>
  <div class="form-container">
    <label for="searchNIK">NIK:</label>
    <input type="text" id="searchNIK" placeholder="Masukkan NIK">

    <label for="searchNama">Nama:</label>
    <input type="text" id="searchNama" placeholder="Masukkan Nama">

    <label for="searchKK">Nomor KK:</label>
    <input type="text" id="searchKK" placeholder="Masukkan Nomor KK">

    <button onclick="cariData()">Cari</button>
    <div id="hasil"></div>
  </div>

  <!-- PapaParse untuk parsing CSV -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script>
    let dataBNBA = [];

    // Fetch file CSV dari repository
    fetch("DATA_BNBA_123.csv")
      .then(res => res.text())
      .then(text => {
        Papa.parse(text, {
          header: true,
          skipEmptyLines: true,
          complete: function(results) {
            dataBNBA = results.data;
            console.log("Data BNBA siap:", dataBNBA);
          }
        });
      });

    function cariData() {
      const nikInput  = document.getElementById("searchNIK").value.trim();
      const namaInput = document.getElementById("searchNama").value.trim().toLowerCase();
      const kkInput   = document.getElementById("searchKK").value.trim();

      let hasil = "<p>Data tidak ditemukan</p>";
      let matches = [];

      for (let row of dataBNBA) {
        const nik  = row["NIK"]?.trim();
        const nama = row["NAMA"]?.toLowerCase();
        const kk   = row["NO. KK"]?.trim();

        if (
          (nikInput && nik === nikInput) ||
          (namaInput && nama.includes(namaInput)) ||
          (kkInput && kk === kkInput)
        ) {
          matches.push(row);
        }
      }

      if (matches.length > 0) {
        hasil = "<h3>Hasil Pencarian:</h3>";
        for (let row of matches) {
          let tableRows = "";
          for (let key in row) {
            tableRows += `<tr><th>${key}</th><td>${row[key]}</td></tr>`;
          }
          hasil += `<table>${tableRows}</table><br>`;
        }
      }

      document.getElementById("hasil").innerHTML = hasil;
    }
  </script>
</body>
</html>
