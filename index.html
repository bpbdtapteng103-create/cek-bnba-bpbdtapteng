<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script>
  let dataBNBA = [];

  // Fetch file CSV dari repository
  fetch("DATA BNBA_123.csv")
    .then(res => res.text())
    .then(text => {
      Papa.parse(text, {
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
          dataBNBA = results.data;
          console.log("Data BNBA siap:", dataBNBA);
        }
      });
    });

  function cariData() {
    const nikInput  = document.getElementById("searchNIK").value.trim();
    const namaInput = document.getElementById("searchNama").value.trim().toLowerCase();
    const kkInput   = document.getElementById("searchKK").value.trim();

    let hasil = "<p>Data tidak ditemukan</p>";

    for (let row of dataBNBA) {
      const nik  = row["NIK"]?.trim();
      const nama = row["NAMA"]?.toLowerCase();
      const kk   = row["NO. KK"]?.trim();

      if (
        (nikInput && nik === nikInput) ||
        (namaInput && nama.includes(namaInput)) ||
        (kkInput && kk === kkInput)
      ) {
        hasil = `
          <table>
            <tr><th>NIK</th><td>${nik}</td></tr>
            <tr><th>Nama</th><td>${row["NAMA"]}</td></tr>
            <tr><th>Nomor KK</th><td>${kk}</td></tr>
            <tr><th>Desa/Kelurahan</th><td>${row["DESA/KELURAHAN"]}</td></tr>
            <tr><th>Kecamatan</th><td>${row["KECAMATAN"]}</td></tr>
            <tr><th>Koordinat</th><td>${row["KOORDINAT"]}</td></tr>
            <tr><th>Kerusakan</th><td>${row["KERUSAKAN"]}</td></tr>
            <tr><th>Keterangan</th><td>${row["KETERANGAN"]}</td></tr>
            <tr><th>Input Data</th><td>${row["INPUT DATA"]}</td></tr>
          </table>
        `;
        break;
      }
    }

    document.getElementById("hasil").innerHTML = hasil;
  }
</script>
